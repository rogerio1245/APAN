<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner de Gabarito</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #121212;
            color: #fff;
            margin: 0;
            padding: 16px;
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            margin: 0 0 8px 0;
        }
        .status {
            background: #1e1e2e;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 0.85rem;
            font-family: monospace;
        }
        .status.erro {
            background: #4a1a1a;
            color: #ff8888;
        }
        .status.sucesso {
            background: #1a4a1a;
            color: #88ff88;
        }
        .camera-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 16px 0;
            position: relative;
            aspect-ratio: 4 / 3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            display: none;
        }
        button {
            background: #0d6efd;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 8px;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #555;
            opacity: 0.6;
        }
        .resultados {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 12px;
            margin-top: 20px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .gabarito-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-top: 10px;
        }
        .gabarito-item {
            background: #2a2a3a;
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            font-family: monospace;
            font-weight: bold;
        }
        .gabarito-item span {
            color: #ffaa44;
        }
        select, input {
            padding: 10px;
            border-radius: 30px;
            border: none;
            margin: 5px;
            font-size: 0.9rem;
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<h1>📸 Scanner de Gabarito</h1>
<p style="font-size:0.8rem; opacity:0.7;">Pinte o retângulo inteiro | App detecta A/B/C/D</p>

<div class="status" id="status">
    🔄 Iniciando câmera...
</div>

<div class="camera-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<div class="flex">
    <button id="btnCapture">📷 TIRAR FOTO</button>
    <button id="btnSimular">🧪 SIMULAR MARCAÇÃO</button>
</div>

<div class="resultados" id="resultados">
    <strong>📋 RESPOSTAS DETECTADAS:</strong>
    <div id="listaRespostas" style="margin-top: 10px;">
        ⏳ Nenhuma captura ainda
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURAÇÃO DO GABARITO (AJUSTE CONFORME SEU MODELO)
    // ============================================================
    const CONFIG = {
        questoesPorBloco: 15,    // 15 questões em cada bloco
        totalQuestoes: 30,       // 15 + 15 = 30
        alternativas: ['A', 'B', 'C', 'D'],
        limiarPreenchimento: 0.35,  // 35% de pixels escuros = preenchido
        debug: true              // Mostra informações de debug
    };

    // Elementos DOM
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnCapture = document.getElementById('btnCapture');
    const btnSimular = document.getElementById('btnSimular');
    const statusDiv = document.getElementById('status');
    const listaRespostas = document.getElementById('listaRespostas');

    let streamAtual = null;
    let respostasDetectadas = {};

    // ============================================================
    // 1. INICIAR CÂMERA (COM FALLBACK)
    // ============================================================
    async function iniciarCamera() {
        // Para qualquer stream anterior
        if (streamAtual) {
            streamAtual.getTracks().forEach(track => track.stop());
        }

        const constraintsList = [
            { video: { facingMode: "environment" } },  // Câmera traseira
            { video: { facingMode: "user" } },         // Câmera frontal
            { video: true }                             // Qualquer câmera
        ];

        for (const constraints of constraintsList) {
            try {
                statusDiv.innerHTML = `📷 Tentando câmera: ${constraints.video.facingMode || 'padrão'}...`;
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                streamAtual = stream;
                
                // Aguardar vídeo carregar
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                
                statusDiv.className = "status sucesso";
                statusDiv.innerHTML = "✅ Câmera ativa! Aponte para o gabarito e clique em TIRAR FOTO";
                return true;
            } catch (err) {
                console.warn("Falha com constraints:", constraints, err);
                continue;
            }
        }

        statusDiv.className = "status erro";
        statusDiv.innerHTML = "❌ ERRO: Nenhuma câmera encontrada. Verifique:\n- HTTPS (ou localhost)\n- Permissão concedida\n- Navegador atualizado (Chrome/Edge/Safari)";
        return false;
    }

    // ============================================================
    // 2. CAPTURAR FOTO E PROCESSAR
    // ============================================================
    async function capturarEProcessar() {
        if (!video.videoWidth || !video.videoHeight) {
            statusDiv.innerHTML = "⚠️ Aguarde a câmera iniciar completamente";
            return;
        }

        statusDiv.innerHTML = "📸 Capturando imagem...";
        
        // Ajustar canvas para o tamanho do vídeo
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Desenhar o frame atual
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Obter dados da imagem
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        statusDiv.innerHTML = "🔍 Processando gabarito...";
        
        // Simular processamento (versão REAL será implementada após validar câmera)
        // Por enquanto, geramos respostas de demonstração
        await simularProcessamento(imageData);
        
        statusDiv.innerHTML = "✅ Gabarito processado! Respostas detectadas abaixo.";
    }

    // ============================================================
    // 3. SIMULAÇÃO DE PROCESSAMENTO (enquanto não temos imagem real)
    // ============================================================
    async function simularProcessamento(imageData) {
        // Simula um tempo de processamento
        await new Promise(resolve => setTimeout(resolve, 500));
        
        // Gerar respostas aleatórias para demonstração
        respostasDetectadas = {};
        for (let q = 1; q <= CONFIG.totalQuestoes; q++) {
            const altAleatoria = CONFIG.alternativas[Math.floor(Math.random() * CONFIG.alternativas.length)];
            respostasDetectadas[q] = altAleatoria;
        }
        
        exibirResultados();
    }

    // ============================================================
    // 4. MODO TESTE - SIMULAR MARCAÇÃO MANUAL
    // ============================================================
    function simularMarcacaoManual() {
        respostasDetectadas = {};
        for (let q = 1; q <= CONFIG.totalQuestoes; q++) {
            // Alterna entre A, B, C, D de forma cíclica para teste
            const idx = (q - 1) % CONFIG.alternativas.length;
            respostasDetectadas[q] = CONFIG.alternativas[idx];
        }
        exibirResultados();
        statusDiv.innerHTML = "🧪 Modo teste: respostas simuladas (cíclico A,B,C,D)";
        statusDiv.className = "status";
    }

    // ============================================================
    // 5. EXIBIR RESULTADOS NA TELA
    // ============================================================
    function exibirResultados() {
        if (!respostasDetectadas || Object.keys(respostasDetectadas).length === 0) {
            listaRespostas.innerHTML = "⚠️ Nenhuma resposta detectada";
            return;
        }
        
        // Criar grade de respostas
        let html = '<div class="gabarito-preview">';
        for (let q = 1; q <= CONFIG.totalQuestoes; q++) {
            const resposta = respostasDetectadas[q] || "?";
            const cor = resposta !== "?" ? "#ffaa44" : "#888";
            html += `<div class="gabarito-item">
                        Q${q}<br>
                        <span style="color:${cor}; font-size:1.2rem;">${resposta}</span>
                     </div>`;
        }
        html += '</div>';
        
        // Adicionar resumo
        const questoesRespondidas = Object.keys(respostasDetectadas).length;
        html += `<div style="margin-top:12px; padding:8px; background:#2a2a3a; border-radius:8px; text-align:center;">
                    ✅ ${questoesRespondidas} de ${CONFIG.totalQuestoes} questões detectadas
                 </div>`;
        
        listaRespostas.innerHTML = html;
        
        // Debug no console
        if (CONFIG.debug) {
            console.log("Respostas detectadas:", respostasDetectadas);
        }
    }

    // ============================================================
    // 6. FUNÇÃO PARA GERAR GABARITO IMPRIMÍVEL (PDF)
    // ============================================================
    function gerarGabaritoParaImpressao() {
        const janela = window.open('', '_blank');
        janela.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>Gabarito para Impressão</title>
            <style>
                @page { size: A4; margin: 15mm; }
                body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
                .pagina { position: relative; }
                .marcador {
                    width: 10mm;
                    height: 10mm;
                    background: black;
                    position: absolute;
                }
                .topo-esq { top: 0; left: 0; }
                .topo-dir { top: 0; right: 0; }
                .baixo-esq { bottom: 0; left: 0; }
                .baixo-dir { bottom: 0; right: 0; }
                .cabecalho { margin-bottom: 20px; text-align: center; }
                .bloco {
                    display: inline-block;
                    width: 48%;
                    vertical-align: top;
                    margin: 0 1%;
                }
                .questao {
                    margin: 8px 0;
                    display: flex;
                    align-items: center;
                }
                .numero {
                    width: 35px;
                    font-weight: bold;
                }
                .alternativas {
                    display: flex;
                    gap: 12px;
                }
                .alternativa {
                    display: inline-flex;
                    flex-direction: column;
                    align-items: center;
                }
                .retangulo {
                    width: 12mm;
                    height: 12mm;
                    border: 1.5px solid black;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                    font-size: 14px;
                }
                .letra {
                    margin-top: 4px;
                    font-size: 12px;
                }
                hr { margin: 20px 0; }
                .instrucoes {
                    background: #f0f0f0;
                    padding: 10px;
                    font-size: 12px;
                    margin-top: 30px;
                }
                @media print {
                    .no-print { display: none; }
                    .marcador { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                }
            </style>
        </head>
        <body>
            <div class="pagina">
                <!-- Marcadores de canto para detecção -->
                <div class="marcador topo-esq"></div>
                <div class="marcador topo-dir"></div>
                <div class="marcador baixo-esq"></div>
                <div class="marcador baixo-dir"></div>
                
                <div class="cabecalho">
                    <h2>GABARITO OFICIAL</h2>
                    <p><strong>NOME:</strong> _________________________ &nbsp;&nbsp;
                       <strong>TURMA:</strong> _______ &nbsp;&nbsp;
                       <strong>DATA:</strong> ___/___/___</p>
                </div>
                
                <div class="bloco">
                    <h3>📘 BLOCO 01 - MATEMÁTICA</h3>
                    ${Array.from({length: CONFIG.questoesPorBloco}, (_, i) => `
                        <div class="questao">
                            <div class="numero">Q${i+1}</div>
                            <div class="alternativas">
                                ${CONFIG.alternativas.map(letra => `
                                    <div class="alternativa">
                                        <div class="retangulo"></div>
                                        <div class="letra">${letra}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="bloco">
                    <h3>📗 BLOCO 02 - MATEMÁTICA</h3>
                    ${Array.from({length: CONFIG.questoesPorBloco}, (_, i) => `
                        <div class="questao">
                            <div class="numero">Q${i+1 + CONFIG.questoesPorBloco}</div>
                            <div class="alternativas">
                                ${CONFIG.alternativas.map(letra => `
                                    <div class="alternativa">
                                        <div class="retangulo"></div>
                                        <div class="letra">${letra}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="instrucoes">
                    <strong>📌 INSTRUÇÕES:</strong><br>
                    • PINTE COMPLETAMENTE o retângulo da alternativa escolhida.<br>
                    • Use caneta escura (preta ou azul).<br>
                    • Não rasure. Se errar, preencha o retângulo todo e marque a correta ao lado.<br>
                    • Os quatro quadrados pretos nos cantos são para calibração do scanner.
                </div>
            </div>
            <div class="no-print" style="text-align:center; margin-top:20px;">
                <button onclick="window.print()">🖨️ IMPRIMIR GABARITO</button>
            </div>
        </body>
        </html>
        `);
        janela.document.close();
    }

    // ============================================================
    // 7. EVENTOS E INICIALIZAÇÃO
    // ============================================================
    btnCapture.addEventListener('click', capturarEProcessar);
    btnSimular.addEventListener('click', simularMarcacaoManual);
    
    // Botão extra para gerar PDF (adicionei no HTML dinamicamente)
    const btnGerarPDF = document.createElement('button');
    btnGerarPDF.textContent = '🖨️ GERAR GABARITO PARA IMPRIMIR';
    btnGerarPDF.style.background = '#198754';
    btnGerarPDF.addEventListener('click', gerarGabaritoParaImpressao);
    document.querySelector('.flex').appendChild(btnGerarPDF);
    
    // Iniciar
    iniciarCamera();
</script>
</body>
</html>
