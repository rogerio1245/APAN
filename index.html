<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RELATÓRIOS</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f6f9;
      padding:20px;
      color:#222;
    }

    h1{
      margin-bottom:20px;
      font-size:28px;
      text-align:center;
    }

    #busca{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:20px;
      font-size:16px;
    }

    .pasta{
      background:white;
      border-radius:12px;
      padding:15px;
      margin-bottom:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .titulo-pasta{
      font-size:20px;
      font-weight:bold;
      margin-bottom:12px;
      color:#0b57d0;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .titulo-pasta:hover{
      opacity: 0.8;
    }

    .toggle-icon {
      font-size: 18px;
      display: inline-block;
      width: 20px;
    }

    .subpasta{
      margin-left:15px;
      margin-bottom:15px;
    }

    .titulo-subpasta{
      font-size:17px;
      font-weight:bold;
      margin-bottom:8px;
      color:#444;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .titulo-subpasta:hover{
      opacity: 0.8;
    }

    .subpasta-content {
      margin-left: 20px;
    }

    .arquivo{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      background:#f1f3f4;
      border-radius:10px;
      margin-bottom:8px;
      transition:0.2s;
    }

    .arquivo:hover{
      background:#dfe7fd;
    }

    .arquivo a{
      text-decoration:none;
      color:#111;
      width:100%;
      font-weight:bold;
    }

    .icone{
      font-size:20px;
    }

    /* Classe para esconder elementos */
    .hidden {
      display: none;
    }

    @media(max-width:700px){

      body{
        padding:10px;
      }

      h1{
        font-size:22px;
      }

      .titulo-pasta{
        font-size:18px;
      }

      .titulo-subpasta{
        font-size:16px;
      }

      .arquivo{
        padding:12px;
      }
    }
  </style>
</head>

<body>

  <h1>📁 RELATÓRIOS</h1>

  <input type="text" id="busca" placeholder="🔍 Buscar relatório...">

  <div id="estrutura"></div>

  <script>

    async function carregarDados(){

      const resposta = await fetch('dados.json');
      const dados = await resposta.json();

      const estrutura = document.getElementById('estrutura');

      for(const pasta in dados.RELATORIOS){

        const divPasta = document.createElement('div');
        divPasta.className = 'pasta';

        // Container do título da pasta com toggle
        const tituloPasta = document.createElement('div');
        tituloPasta.className = 'titulo-pasta';
        
        const iconSpan = document.createElement('span');
        iconSpan.className = 'toggle-icon';
        iconSpan.textContent = '▼'; // Começa aberto
        
        const textSpan = document.createElement('span');
        textSpan.innerHTML = '📁 ' + pasta;
        
        tituloPasta.appendChild(iconSpan);
        tituloPasta.appendChild(textSpan);
        
        divPasta.appendChild(tituloPasta);

        // Container para o conteúdo da pasta (subpastas)
        const pastaContent = document.createElement('div');
        pastaContent.className = 'pasta-content';

        const conteudoPasta = dados.RELATORIOS[pasta];

        for(const subpasta in conteudoPasta){

          const divSub = document.createElement('div');
          divSub.className = 'subpasta';

          // Container do título da subpasta com toggle
          const tituloSub = document.createElement('div');
          tituloSub.className = 'titulo-subpasta';
          
          const subIconSpan = document.createElement('span');
          subIconSpan.className = 'toggle-icon';
          subIconSpan.textContent = '▼'; // Começa aberto
          
          const subTextSpan = document.createElement('span');
          subTextSpan.innerHTML = '📂 ' + subpasta;
          
          tituloSub.appendChild(subIconSpan);
          tituloSub.appendChild(subTextSpan);
          
          divSub.appendChild(tituloSub);

          // Container para os arquivos da subpasta
          const subContent = document.createElement('div');
          subContent.className = 'subpasta-content';

          const arquivos = conteudoPasta[subpasta];

          arquivos.forEach(nomeArquivo => {

            const divArquivo = document.createElement('div');
            divArquivo.className = 'arquivo';

            const caminho = `RELATORIOS/${pasta}/${subpasta}/${nomeArquivo}`;

            divArquivo.innerHTML = `
              <span class="icone">🌎</span>
              <a href="${caminho}" target="_blank">
                ${nomeArquivo.replace('.html','')}
              </a>
            `;

            subContent.appendChild(divArquivo);

          });

          divSub.appendChild(subContent);
          pastaContent.appendChild(divSub);

          // Evento de toggle para a subpasta
          tituloSub.addEventListener('click', function(e) {
            e.stopPropagation();
            const content = this.nextElementSibling;
            const icon = this.querySelector('.toggle-icon');
            
            if(content.classList.contains('hidden')) {
              content.classList.remove('hidden');
              icon.textContent = '▼';
            } else {
              content.classList.add('hidden');
              icon.textContent = '▶';
            }
          });

        }

        divPasta.appendChild(pastaContent);
        estrutura.appendChild(divPasta);

        // Evento de toggle para a pasta principal
        tituloPasta.addEventListener('click', function(e) {
          e.stopPropagation();
          const content = this.nextElementSibling;
          const icon = this.querySelector('.toggle-icon');
          
          if(content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.textContent = '▼';
          } else {
            content.classList.add('hidden');
            icon.textContent = '▶';
          }
        });

      }

    }

    carregarDados();

    document.getElementById('busca').addEventListener('keyup', function(){

      const texto = this.value.toLowerCase();

      const arquivos = document.querySelectorAll('.arquivo');

      arquivos.forEach(item => {

        const nome = item.innerText.toLowerCase();

        if(nome.includes(texto)){
          item.style.display = 'flex';
        }else{
          item.style.display = 'none';
        }

      });

    });

  </script>

</body>
</html>
