<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1_RELATÓRIO_2026</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f6f9;
      padding:20px;
      color:#222;
    }

    h1{
      margin-bottom:20px;
      font-size:28px;
      text-align:center;
    }

    #busca{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:20px;
      font-size:16px;
    }

    .pasta{
      background:white;
      border-radius:12px;
      padding:15px;
      margin-bottom:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .titulo-pasta{
      font-size:20px;
      font-weight:bold;
      margin-bottom:12px;
      color:#0b57d0;
    }

    .subpasta{
      margin-left:15px;
      margin-bottom:15px;
    }

    .titulo-subpasta{
      font-size:17px;
      font-weight:bold;
      margin-bottom:8px;
      color:#444;
    }

    .arquivo{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px;
      background:#f1f3f4;
      border-radius:10px;
      margin-bottom:8px;
      transition:0.2s;
    }

    .arquivo:hover{
      background:#dfe7fd;
    }

    .arquivo a{
      text-decoration:none;
      color:#111;
      width:100%;
      font-weight:bold;
    }

    .icone{
      font-size:20px;
    }

    @media(max-width:700px){

      body{
        padding:10px;
      }

      h1{
        font-size:22px;
      }

      .titulo-pasta{
        font-size:18px;
      }

      .titulo-subpasta{
        font-size:16px;
      }

      .arquivo{
        padding:12px;
      }

    }
  </style>
</head>

<body>

  <h1>📁 1_RELATÓRIO_2026</h1>

  <input type="text" id="busca" placeholder="🔍 Buscar relatório...">

  <div id="estrutura"></div>

  <script>

    async function carregarDados(){

      const resposta = await fetch('dados.json');
      const dados = await resposta.json();

      const estrutura = document.getElementById('estrutura');

      for(const pasta in dados.RELATORIOS){

        const divPasta = document.createElement('div');
        divPasta.className = 'pasta';

        const tituloPasta = document.createElement('div');
        tituloPasta.className = 'titulo-pasta';
        tituloPasta.innerHTML = '📁 ' + pasta;

        divPasta.appendChild(tituloPasta);

        const conteudoPasta = dados.1_RELATÓRIO_2026[pasta];

        for(const subpasta in conteudoPasta){

          const divSub = document.createElement('div');
          divSub.className = 'subpasta';

          const tituloSub = document.createElement('div');
          tituloSub.className = 'titulo-subpasta';
          tituloSub.innerHTML = '📂 ' + subpasta;

          divSub.appendChild(tituloSub);

          const arquivos = conteudoPasta[subpasta];

          arquivos.forEach(nomeArquivo => {

            const divArquivo = document.createElement('div');
            divArquivo.className = 'arquivo';

            const caminho =
              `RELATORIOS/${pasta}/${subpasta}/${nomeArquivo}`;

            divArquivo.innerHTML = `
              <span class="icone">🌎</span>
              <a href="${caminho}" target="_blank">
                ${nomeArquivo.replace('.html','')}
              </a>
            `;

            divSub.appendChild(divArquivo);

          });

          divPasta.appendChild(divSub);

        }

        estrutura.appendChild(divPasta);

      }

    }

    carregarDados();

    document.getElementById('busca').addEventListener('keyup', function(){

      const texto = this.value.toLowerCase();

      const arquivos = document.querySelectorAll('.arquivo');

      arquivos.forEach(item => {

        const nome = item.innerText.toLowerCase();

        if(nome.includes(texto)){
          item.style.display = 'flex';
        }else{
          item.style.display = 'none';
        }

      });

    });

  </script>

</body>
</html>
